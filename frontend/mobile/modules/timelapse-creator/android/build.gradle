plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.timelapsecreator'
version = '0.7.9'

android {
  namespace "expo.modules.timelapsecreator"
  defaultConfig {
    versionCode 1
    versionName "0.7.9"
  }
  lintOptions {
    abortOnError false
  }
}

dependencies {
  implementation "androidx.exifinterface:exifinterface:1.3.7"
}
